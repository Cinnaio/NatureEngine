debug:
  enabled: true
  default-level: INFO
  log-to-file: false
  modules:
    core-season: INFO
    core-weather: INFO
    core-environment: INFO
    core-growth: INFO
    core-crop: INFO
    integration-craftengine: INFO
    simulation: INFO
    config: INFO
    command: INFO
    debug: INFO

# ============================================================
# 时间轴基准（季节/节气/年份）
# ============================================================
time:
  # primary: 全服统一以主世界为基准（推荐，跨维度一致）
  # per-world: 每个世界独立时间轴（世界不加载则时间暂停）
  base-mode: primary

  # base-mode=primary 时生效：作为“基准世界”的世界名（默认 world）
  primary-world: world

