# ============================================================
# 天气配置
# 天气由季节控制：定时任务按 tick-interval 执行，根据当前季节的
# season-weights 做加权随机选择下一天气，并设置持续时长。
# 季节来源：世界时间（world.getFullTime()）经 SeasonManager 计算得出。
# ============================================================

weather:
  # 天气切换检测间隔（秒）。每间隔到期，对所有世界按当前季节重新随机选天气。
  tick-interval-seconds: 90

  # 各天气类型持续时间（秒）。选到该天气后，世界将保持该天气此时长。
  duration-seconds:
    SUNNY: 300
    RAIN: 240
    STORM: 180
    SNOW: 240

  # 季节 → 天气权重。每季节内，各天气的权重决定被选中的概率（权重越高越容易出现）。
  # 例如 spring: SUNNY=6, RAIN=10 → 晴天 6/(6+10+2)=33%，雨天 56%，雷雨 11%。
  # 权重为 0 表示该季节不会出现该天气（如冬季无晴天可设 SUNNY: 0）。
  season-weights:
    spring:
      SUNNY: 6
      RAIN: 10
      STORM: 2
      SNOW: 0
    summer:
      SUNNY: 14
      RAIN: 4
      STORM: 1
      SNOW: 0
    autumn:
      SUNNY: 6
      RAIN: 8
      STORM: 3
      SNOW: 0
    winter:
      SUNNY: 5
      RAIN: 2
      STORM: 2
      SNOW: 10

  # 节气 → 天气权重乘子（叠加到 season-weights 上）。
  # - 只影响“抽选下一天气”的概率，不直接改 profiles（温湿度/生长倍率仍由 profiles 控制）
  # - 未配置的节气/天气默认乘子为 1.0
  # - 乘子为 0 表示该节气内该天气不会被抽到
  #
  # key 为 24 节气名的小写（对应 SolarTerm#key）：
  # lichun yushui jingzhe chunfen qingming guyu
  # lixia xiaoman mangzhong xiazhi xiaoshu dashu
  # liqiu chushu bailu qiufen hanlu shuangjiang
  # lidong xiaoxue daxue dongzhi xiaohan dahan
  solar-term-weight-multipliers:
    # 清明：清明时节雨纷纷
    qingming:
      RAIN: 1.30
    # 谷雨：雨生百谷
    guyu:
      RAIN: 1.50
      STORM: 1.10

  # 各天气对 Environment 的影响：温度/湿度/土壤湿度偏移，及生长倍率。
  # 用于 EnvironmentManager 计算作物生长、枯萎等。
  profiles:
    # temperature-delta: 在季节基准温度上的增减；humidity/soil-moisture-delta 同理
    # growth-multiplier: 该天气下作物生长的额外倍率（与季节 growth-multiplier 叠加）
    SUNNY:
      # vanilla 标尺：温度约 0~2，湿度 0~1
      temperature-delta: 0.05
      humidity-delta: -0.02
      soil-moisture-delta: -0.02
      growth-multiplier: 1.0
    RAIN:
      temperature-delta: -0.03
      humidity-delta: 0.05
      soil-moisture-delta: 0.20
      growth-multiplier: 1.1
    STORM:
      temperature-delta: -0.05
      humidity-delta: 0.06
      soil-moisture-delta: 0.25
      growth-multiplier: 0.93
    SNOW:
      temperature-delta: -0.12
      humidity-delta: 0.02
      soil-moisture-delta: 0.10
      growth-multiplier: 0.85

