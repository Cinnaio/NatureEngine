seasons:
  # 季节提示（手动切季节 /ne season next|set|clear 时触发）
  notify:
    enabled: true
    # mode: actionbar | chat | both
    mode: actionbar
    # 支持 &/§ 颜色码、&#RRGGBB，以及 MiniMessage（例如 <color:#ffcc00>）
    # 柔和配色（偏粉蓝紫，尽量不刺眼）
    # - {season}: 春/夏/秋/冬
    # - {season_en}: SPRING/SUMMER/AUTUMN/WINTER
    message: "<color:#B8C7FF>季节 <color:#A9B3C3>→ <color:#FFE2A9>{season}"

  spring:
    length-days: 10
    base-temperature: 15.0
    base-humidity: 0.7
    growth-multiplier: 1.2
    yield-multiplier: 1.0
    easy-to-wither: false

  summer:
    length-days: 10
    base-temperature: 25.0
    base-humidity: 0.5
    growth-multiplier: 1.1
    yield-multiplier: 1.1
    easy-to-wither: false

  autumn:
    length-days: 10
    base-temperature: 10.0
    base-humidity: 0.6
    growth-multiplier: 1.0
    yield-multiplier: 1.2
    easy-to-wither: false

  winter:
    length-days: 10
    base-temperature: 0.0
    base-humidity: 0.4
    growth-multiplier: 0.5
    yield-multiplier: 0.8
    easy-to-wither: true

