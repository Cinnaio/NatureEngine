  debug:
    title: "<color:#B8C7FF>[NatureEngine Debug]"
    season-line: "<color:#A9B3C3>Season <color:#FFE2A9>{season} <color:#A9B3C3>{progress}%"
    solar-term-line: "<color:#A9B3C3>Solar term <color:#FFE2A9>{term} <color:#A9B3C3>{progress}% <color:#A9B3C3>(ETA≈{days}d)"
    day-line: "<color:#A9B3C3>Time <color:#A9B3C3>Day <color:#FFE2A9>{day}<color:#A9B3C3> <color:#A9B3C3>(Season ETA≈<color:#FFE2A9>{season_days}<color:#A9B3C3>d)"
    year-line: "<color:#A9B3C3>Year <color:#FFE2A9>{year}<color:#A9B3C3> <color:#A9B3C3>(DayInYear=<color:#FFE2A9>{day_in_year}<color:#A9B3C3>/<color:#FFE2A9>{year_len}<color:#A9B3C3>)"
    weather-line: "<color:#A9B3C3>Weather <color:#FFE2A9>{weather}"
    env-line: "<color:#A9B3C3>Env enabled=<color:#FFE2A9>{env_enabled}\n<color:#A9B3C3>- <color:#B7F0C2>[Structure]<color:#A9B3C3> Type=<color:#FFE2A9>{env_type} <color:#A9B3C3>Openness=<color:#FFE2A9>{openness} <color:#A9B3C3>Exposure=<color:#FFE2A9>{exposure}\n<color:#A9B3C3>- <color:#B7F0C2>[Detail]<color:#A9B3C3> OpenRatio=<color:#FFE2A9>{open_ratio} <color:#A9B3C3>RoofDy=<color:#FFE2A9>{roof_dy}\n<color:#A9B3C3>- <color:#B7F0C2>[Sample]<color:#A9B3C3> T=<color:#FFE2A9>{temp} <color:#A9B3C3>H=<color:#FFE2A9>{humidity} <color:#A9B3C3>Soil=<color:#FFE2A9>{soil} <color:#A9B3C3>Light=<color:#FFE2A9>{light} <color:#A9B3C3>Sky=<color:#FFE2A9>{sky_light} <color:#A9B3C3>Block=<color:#FFE2A9>{block_light}\n<color:#A9B3C3>- <color:#B7F0C2>[Location]<color:#A9B3C3> AltY=<color:#FFE2A9>{alt_y} <color:#A9B3C3>Biome=<color:#FFE2A9>{biome} <color:#A9B3C3>Group=<color:#FFE2A9>{biome_group}"
    crop-summary: "<color:#A9B3C3>Crop <color:#FFE2A9>{block} <color:#A9B3C3>({crop_id}) Enabled <color:#FFE2A9>{crop_enabled} <color:#A9B3C3>Stage <color:#FFE2A9>{age}<color:#A9B3C3>/{max_age} <color:#A9B3C3>Decision <color:#FFE2A9>{decision} <color:#A9B3C3>Total <color:#FFE2A9>{total}"
    crop-factors: "<color:#A9B3C3>Factors <color:#FFE2A9>T={tf} H={hf} L={lf} S={sf} W={wf} <color:#A9B3C3>Base=<color:#FFE2A9>{total_before}"
    crop-env-bonus: "<color:#A9B3C3>Env bonus <color:#A9B3C3>Penalty={bad_penalty} Stability={stability} Mitigate={mitigation} Boost={boost} Total <color:#FFE2A9>{total_before} <color:#A9B3C3>-> <color:#FFE2A9>{total_after}"
    crop-env: "<color:#A9B3C3>Env\n<color:#A9B3C3>- <color:#B7F0C2>[Structure]<color:#A9B3C3> Type=<color:#FFE2A9>{env_type} <color:#A9B3C3>Openness=<color:#FFE2A9>{openness} <color:#A9B3C3>Exposure=<color:#FFE2A9>{exposure}\n<color:#A9B3C3>- <color:#B7F0C2>[Detail]<color:#A9B3C3> OpenRatio=<color:#FFE2A9>{open_ratio} <color:#A9B3C3>RoofDy=<color:#FFE2A9>{roof_dy}\n<color:#A9B3C3>- <color:#B7F0C2>[Sample]<color:#A9B3C3> T=<color:#FFE2A9>{env_temp} <color:#A9B3C3>H=<color:#FFE2A9>{env_hum} <color:#A9B3C3>Soil=<color:#FFE2A9>{env_soil} <color:#A9B3C3>Light=<color:#FFE2A9>{env_light}"
    crop-thresholds: "<color:#A9B3C3>Thresholds <color:#FFE2A9>Adv={advance_th} Wither={wither_th}"
    crop-params: "<color:#A9B3C3>Params <color:#FFE2A9>OptT={opt_temp}±{temp_tol} OptH={opt_hum}±{hum_tol} MinLight={min_light} PrefSeasons={pref_seasons} CfgStages={stages}"
    crop-none: "<color:#A9B3C3>Crop <color:#FFE2A9>{block} <color:#A9B3C3>is not controlled (crops.enabled={crops_enabled}, or not registered/disabled)"
    crop-ce-unregistered: "<color:#A9B3C3>CraftEngine <color:#FFE2A9>{custom_id} <color:#A9B3C3>is not controlled (crops.enabled={crops_enabled}, or not registered/disabled in crops.yml:crops.craftengine)"

  sim:
    crop-header: "<color:#B8C7FF>[Sim] <color:#A9B3C3>{block} <color:#FFE2A9>{crop_id} <color:#A9B3C3>Base(T={base_t} H={base_h} Soil={base_soil} Light={light}) Th(A={advance_th} W={wither_th}) Env(Type={env_type},Growth={env_growth})"
    crop-legend: "<color:#A9B3C3>Legend: <color:#FFE2A9>(A)=ADVANCE (B)=BLOCK (W)=WITHER"
    crop-none: "<color:#A9B3C3>Target <color:#FFE2A9>{block} <color:#A9B3C3>is not controlled; can't simulate (register/enable in crops.yml)"
    crop-ce-none: "<color:#A9B3C3>Target CraftEngine <color:#FFE2A9>{custom_id} <color:#A9B3C3>is not controlled; can't simulate (register/enable in crops.yml:crops.craftengine)"

  visual:
    only-world: "<color:#FFB4B4>This command only works in world."
    refresh-started: "<color:#A9B3C3>Refreshing season visuals…"
    refresh-started-season: "<color:#A9B3C3>Refreshing visuals <color:#FFE2A9>{season}"
    not-ready: "<color:#FFB4B4>Visual system is disabled or not initialized."
    restore-hint: "<color:#A9B3C3>Packet-based visuals restore as chunks resend (or rejoin)."

