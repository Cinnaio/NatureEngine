lang:
  meta:
    name: "English (US)"
    code: "en_us"

  common:
    no-permission: "<color:#FFB4B4>You don't have permission to do that."
    config-not-ready: "<color:#FFB4B4>Config system is not initialized."
    reloaded: "<color:#A9B3C3>Reloaded: <color:#FFE2A9>{module}"
    only-player: "<color:#FFB4B4>This command can only be used by a player."

  command:
    ne:
      help-title: "<color:#B8C7FF>[NatureEngine] <color:#A9B3C3>Commands:"
      help-debug: "<color:#A9B3C3>- <color:#FFE2A9>/ne debug <color:#A9B3C3>Show season/weather/env and crop debug"
      help-debug-crop: "<color:#A9B3C3>- <color:#FFE2A9>/ne debug crop <color:#A9B3C3>Show targeted crop growth debug only"
      help-season-info: "<color:#A9B3C3>- <color:#FFE2A9>/ne season info <color:#A9B3C3>Show current season info"
      help-season-next: "<color:#A9B3C3>- <color:#FFE2A9>/ne season next <color:#A9B3C3>Switch to next season"
      help-season-set: "<color:#A9B3C3>- <color:#FFE2A9>/ne season set <spring|summer|autumn|winter> <color:#A9B3C3>Set current season"
      help-season-clear: "<color:#A9B3C3>- <color:#FFE2A9>/ne season clear <color:#A9B3C3>Clear season override"
      help-season-apply: "<color:#A9B3C3>- <color:#FFE2A9>/ne season apply <color:#A9B3C3>Re-apply season visuals"
      help-reload: "<color:#A9B3C3>- <color:#FFE2A9>/ne reload <...> <color:#A9B3C3>Reload config module"

  season:
    display:
      spring: "Spring"
      summer: "Summer"
      autumn: "Autumn"
      winter: "Winter"
    info-title: "<color:#B8C7FF>[NatureEngine] <color:#A9B3C3>Season Info"
    override-set: "<color:#A9B3C3>Season set to <color:#FFE2A9>{season} <color:#A9B3C3>(override)"
    override-cleared: "<color:#A9B3C3>Season override cleared. Back to natural cycle."
    hint-visual-restore: "<color:#A9B3C3>Tip: visuals will recover as chunks resend."
    notify-actionbar: "<color:#A9B3C3>Season <color:#FFE2A9>{season} <color:#A9B3C3>· <color:#FFE2A9>{days_left} <color:#A9B3C3>days left"
    notify-chat-line1: "<color:#A9B3C3>Season changed to <color:#FFE2A9>{season}"
    notify-chat-line2: "<color:#A9B3C3>Lasts <color:#FFE2A9>{duration} <color:#A9B3C3>days, <color:#FFE2A9>{next_season} <color:#A9B3C3>in <color:#FFE2A9>{days_left} <color:#A9B3C3>days"
    notify-chat-features: "<color:#A9B3C3>Traits: <color:#FFE2A9>{features}"
    features-growth: "Growth x{growth}"
    features-yield: "Yield x{yield}"
    features-wither: "Easy wither"
    no-permission-control: "<color:#FFB4B4>You don't have permission to control seasons."
    set-usage: "<color:#A9B3C3>Usage <color:#FFE2A9>/ne season set <spring|summer|autumn|winter>"
    unknown-season: "<color:#FFB4B4>Unknown season <color:#FFE2A9>{input} <color:#A9B3C3>Valid <color:#FFE2A9>spring, summer, autumn, winter"
    world-line: "<color:#A9B3C3>World <color:#FFE2A9>{world}"
    season-line: "<color:#A9B3C3>Season <color:#FFE2A9>{season} <color:#A9B3C3>{progress}%"
    override-status-line: "<color:#A9B3C3>Override {status}"
    override-status-on: "<color:#FFB4B4>On"
    override-status-off: "<color:#B7F0C2>Off"

  weather:
    display:
      sunny: "Sunny"
      rain: "Rain"
      storm: "Storm"
      cloudy: "Cloudy"
      snow: "Snow"

  debug:
    title: "<color:#B8C7FF>[NatureEngine Debug]"
    season-line: "<color:#A9B3C3>Season <color:#FFE2A9>{season} <color:#A9B3C3>{progress}%"
    weather-line: "<color:#A9B3C3>Weather <color:#FFE2A9>{weather}"
    env-line: "<color:#A9B3C3>Env <color:#FFE2A9>T={temp} <color:#A9B3C3>H={humidity} <color:#A9B3C3>Soil={soil} <color:#A9B3C3>Light={light}"
    crop-line: "<color:#A9B3C3>Crop <color:#FFE2A9>{block} <color:#A9B3C3>({crop_id}) <color:#A9B3C3>Control <color:#FFE2A9>{crops_enabled} <color:#A9B3C3>/Enabled <color:#FFE2A9>{crop_enabled} <color:#A9B3C3>Stage <color:#FFE2A9>{age}<color:#A9B3C3>/{max_age} <color:#A9B3C3>CfgStages <color:#FFE2A9>{stages} <color:#A9B3C3>Th A={advance_th} W={wither_th} <color:#A9B3C3>Decision <color:#FFE2A9>{decision} <color:#A9B3C3>Total <color:#FFE2A9>{total} <color:#A9B3C3>Factors T={tf} H={hf} L={lf} S={sf} W={wf} <color:#A9B3C3>Env T={env_temp} H={env_hum} Soil={env_soil} Light={env_light} <color:#A9B3C3>Crop OptT={opt_temp}±{temp_tol} OptH={opt_hum}±{hum_tol} MinL={min_light} Seasons={pref_seasons}"
    crop-none: "<color:#A9B3C3>Crop <color:#FFE2A9>{block} <color:#A9B3C3>is not controlled (crops.enabled={crops_enabled}, or not registered/disabled)"

  visual:
    only-world: "<color:#FFB4B4>This command only works in world."
    refresh-started: "<color:#A9B3C3>Refreshing season visuals…"
    refresh-started-season: "<color:#A9B3C3>Refreshing visuals <color:#FFE2A9>{season}"
    not-ready: "<color:#FFB4B4>Visual system is disabled or not initialized."
    restore-hint: "<color:#A9B3C3>Packet-based visuals restore as chunks resend (or rejoin)."

