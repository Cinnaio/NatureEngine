lang:
  meta:
    name: "简体中文"
    code: "zh_cn"

  # 通用
  common:
    no-permission: "<color:#FFB4B4>你没有权限执行该命令。"
    config-not-ready: "<color:#FFB4B4>配置系统未初始化。"
    reloaded: "<color:#A9B3C3>已重载： <color:#FFE2A9>{module}"
    only-player: "<color:#FFB4B4>该命令只能由玩家执行。"

  # /ne help
  command:
    ne:
      help-title: "<color:#B8C7FF>[NatureEngine] <color:#A9B3C3>可用子命令："
      help-debug: "<color:#A9B3C3>- <color:#FFE2A9>/ne debug <color:#A9B3C3>显示当前世界季节、天气、环境与作物调试"
      help-debug-crop: "<color:#A9B3C3>- <color:#FFE2A9>/ne debug crop <color:#A9B3C3>仅显示指向目标的作物生长调试"
      help-sim-crop: "<color:#A9B3C3>- <color:#FFE2A9>/ne sim crop <color:#A9B3C3>模拟四季×天气对目标作物的计算结果(不修改方块)"
      help-season-info: "<color:#A9B3C3>- <color:#FFE2A9>/ne season info <color:#A9B3C3>显示当前世界季节信息"
      help-season-next: "<color:#A9B3C3>- <color:#FFE2A9>/ne season next <color:#A9B3C3>切换到下一季节"
      help-season-set: "<color:#A9B3C3>- <color:#FFE2A9>/ne season set <spring|summer|autumn|winter> <color:#A9B3C3>设置当前世界季节"
      help-season-clear: "<color:#A9B3C3>- <color:#FFE2A9>/ne season clear <color:#A9B3C3>清除手动季节覆盖"
      help-season-apply: "<color:#A9B3C3>- <color:#FFE2A9>/ne season apply <color:#A9B3C3>重新应用当前季节视觉效果"
      help-reload: "<color:#A9B3C3>- <color:#FFE2A9>/ne reload <...> <color:#A9B3C3>重载配置模块"
      crop-usage: "<color:#B8C7FF>用法: <color:#FFE2A9>/ne crop randomTickSpeed [值]"
      crop-rts-get: "<color:#A9B3C3>插件 randomTickSpeed = <color:#FFE2A9>{value}"
      crop-rts-set: "<color:#A9B3C3>插件 randomTickSpeed 已设置为 <color:#FFE2A9>{value}"
      crop-rts-invalid: "<color:#FFB4B4>请输入整数，例如: <color:#FFE2A9>/ne crop randomTickSpeed 3"

  season:
    display:
      spring: "春"
      summer: "夏"
      autumn: "秋"
      winter: "冬"
    info-title: "<color:#B8C7FF>[NatureEngine] <color:#A9B3C3>季节信息"
    override-set: "<color:#A9B3C3>季节已切换为 <color:#FFE2A9>{season} <color:#A9B3C3>(手动覆盖)"
    override-cleared: "<color:#A9B3C3>已清除季节覆盖，恢复自然推进。"
    hint-visual-restore: "<color:#A9B3C3>提示：发包视觉会在区块重新发送时自然恢复。"
    notify-actionbar: "<color:#A9B3C3>季节 <color:#FFE2A9>{season} <color:#A9B3C3>· 剩余 <color:#FFE2A9>{days_left} <color:#A9B3C3>天"
    notify-chat-line1: "<color:#A9B3C3>季节已切换为 <color:#FFE2A9>{season}"
    notify-chat-line2: "<color:#A9B3C3>持续 <color:#FFE2A9>{duration} <color:#A9B3C3>天，下一季节 <color:#FFE2A9>{next_season} <color:#A9B3C3>将在 <color:#FFE2A9>{days_left} <color:#A9B3C3>天后到来"
    notify-chat-features: "<color:#A9B3C3>特性：<color:#FFE2A9>{features}"
    features-growth: "生长 x{growth}"
    features-yield: "产量 x{yield}"
    features-wither: "易枯萎"
    no-permission-control: "<color:#FFB4B4>你没有权限控制季节。"
    set-usage: "<color:#A9B3C3>用法 <color:#FFE2A9>/ne season set <spring|summer|autumn|winter>"
    unknown-season: "<color:#FFB4B4>未知季节 <color:#FFE2A9>{input} <color:#A9B3C3>可用 <color:#FFE2A9>spring, summer, autumn, winter"
    world-line: "<color:#A9B3C3>世界 <color:#FFE2A9>{world}"
    season-line: "<color:#A9B3C3>季节 <color:#FFE2A9>{season} <color:#A9B3C3>{progress}%"
    override-status-line: "<color:#A9B3C3>覆盖 {status}"
    override-status-on: "<color:#FFB4B4>已覆盖"
    override-status-off: "<color:#B7F0C2>自然推进"

  weather:
    display:
      sunny: "晴"
      rain: "雨"
      storm: "雷雨"
      cloudy: "阴"
      snow: "雪"

  environment:
    type:
      indoor: "室内"
      semi_outdoor: "半室外"
      greenhouse: "温室"
      outdoor: "室外"

  solar-term:
    lichun: "立春"
    yushui: "雨水"
    jingzhe: "惊蛰"
    chunfen: "春分"
    qingming: "清明"
    guyu: "谷雨"
    lixia: "立夏"
    xiaoman: "小满"
    mangzhong: "芒种"
    xiazhi: "夏至"
    xiaoshu: "小暑"
    dashu: "大暑"
    liqiu: "立秋"
    chushu: "处暑"
    bailu: "白露"
    qiufen: "秋分"
    hanlu: "寒露"
    shuangjiang: "霜降"
    lidong: "立冬"
    xiaoxue: "小雪"
    daxue: "大雪"
    dongzhi: "冬至"
    xiaohan: "小寒"
    dahan: "大寒"

  debug:
    title: "<color:#B8C7FF>[NatureEngine Debug]"
    season-line: "<color:#A9B3C3>季节 <color:#FFE2A9>{season} <color:#A9B3C3>{progress}%"
    solar-term-line: "<color:#A9B3C3>节气 <color:#FFE2A9>{term} <color:#A9B3C3>{progress}% <color:#A9B3C3>(剩余≈{days}天)"
    day-line: "<color:#A9B3C3>时间 <color:#A9B3C3>第<color:#FFE2A9>{day}<color:#A9B3C3>天 <color:#A9B3C3>(该季还剩≈<color:#FFE2A9>{season_days}<color:#A9B3C3>天)"
    weather-line: "<color:#A9B3C3>天气 <color:#FFE2A9>{weather}"
    env-line: "<color:#A9B3C3>环境 模块=<color:#FFE2A9>{env_enabled}\n<color:#A9B3C3>- <color:#B7F0C2>[结构]<color:#A9B3C3> 类型=<color:#FFE2A9>{env_type} <color:#A9B3C3>结构露天=<color:#FFE2A9>{openness} <color:#A9B3C3>物理暴露=<color:#FFE2A9>{exposure}\n<color:#A9B3C3>- <color:#B7F0C2>[结构细节]<color:#A9B3C3> 开口比=<color:#FFE2A9>{open_ratio} <color:#A9B3C3>屋顶dy=<color:#FFE2A9>{roof_dy}\n<color:#A9B3C3>- <color:#B7F0C2>[采样]<color:#A9B3C3> 温度=<color:#FFE2A9>{temp} <color:#A9B3C3>湿度=<color:#FFE2A9>{humidity} <color:#A9B3C3>土壤=<color:#FFE2A9>{soil} <color:#A9B3C3>光照=<color:#FFE2A9>{light} <color:#A9B3C3>天空光=<color:#FFE2A9>{sky_light} <color:#A9B3C3>方块光=<color:#FFE2A9>{block_light}\n<color:#A9B3C3>- <color:#B7F0C2>[位置]<color:#A9B3C3> 海拔Y=<color:#FFE2A9>{alt_y} <color:#A9B3C3>群系=<color:#FFE2A9>{biome} <color:#A9B3C3>组=<color:#FFE2A9>{biome_group}"
    crop-summary: "<color:#A9B3C3>作物 <color:#FFE2A9>{block} <color:#A9B3C3>({crop_id})· 启用 <color:#FFE2A9>{crop_enabled} <color:#A9B3C3>· 阶段 <color:#FFE2A9>{age}<color:#A9B3C3>/{max_age} <color:#A9B3C3>· 判定 <color:#FFE2A9>{decision} <color:#A9B3C3>· 总值 <color:#FFE2A9>{total}"
    crop-factors: "<color:#A9B3C3>因子 <color:#FFE2A9>温度={tf} 湿度={hf} 光照={lf} 季节={sf} 天气={wf} <color:#A9B3C3>基础总值=<color:#FFE2A9>{total_before}"
    crop-env-bonus: "<color:#A9B3C3>环境加成 <color:#A9B3C3>惩罚={bad_penalty} 稳定={stability} 削弱={mitigation} 推进倍率={boost} 总值 <color:#FFE2A9>{total_before} <color:#A9B3C3>-> <color:#FFE2A9>{total_after}"
    crop-env: "<color:#A9B3C3>环境\n<color:#A9B3C3>- <color:#B7F0C2>[结构]<color:#A9B3C3> 类型=<color:#FFE2A9>{env_type} <color:#A9B3C3>结构露天=<color:#FFE2A9>{openness} <color:#A9B3C3>物理暴露=<color:#FFE2A9>{exposure}\n<color:#A9B3C3>- <color:#B7F0C2>[结构细节]<color:#A9B3C3> 开口比=<color:#FFE2A9>{open_ratio} <color:#A9B3C3>屋顶dy=<color:#FFE2A9>{roof_dy}\n<color:#A9B3C3>- <color:#B7F0C2>[采样]<color:#A9B3C3> 温度=<color:#FFE2A9>{env_temp} <color:#A9B3C3>湿度=<color:#FFE2A9>{env_hum} <color:#A9B3C3>土壤=<color:#FFE2A9>{env_soil} <color:#A9B3C3>光照=<color:#FFE2A9>{env_light}"
    crop-thresholds: "<color:#A9B3C3>阈值 <color:#FFE2A9>推进={advance_th} 枯萎={wither_th}"
    crop-params: "<color:#A9B3C3>参数 <color:#FFE2A9>最适温={opt_temp}±{temp_tol} 最适湿={opt_hum}±{hum_tol} 最低光={min_light} 偏好季节={pref_seasons} 阶段数={stages}"
    crop-none: "<color:#A9B3C3>作物 <color:#FFE2A9>{block} <color:#A9B3C3>未被作物系统接管(crops.enabled={crops_enabled}，或未在 crops.yml 注册/已禁用)"
    crop-ce-unregistered: "<color:#A9B3C3>CraftEngine <color:#FFE2A9>{custom_id} <color:#A9B3C3>未被作物系统接管(crops.enabled={crops_enabled}，或未在 crops.yml 的 crops.craftengine 注册/已禁用)"

  sim:
    crop-header: "<color:#B8C7FF>[Sim] <color:#A9B3C3>{block} <color:#FFE2A9>{crop_id} <color:#A9B3C3>Base(T={base_t} H={base_h} Soil={base_soil} Light={light}) Th(A={advance_th} W={wither_th}) Env(Type={env_type},Growth={env_growth})"
    crop-legend: "<color:#A9B3C3>图例：<color:#FFE2A9>(A)=ADVANCE (B)=BLOCK (W)=WITHER"
    crop-none: "<color:#A9B3C3>目标 <color:#FFE2A9>{block} <color:#A9B3C3>未被作物系统接管，无法模拟(请先在 crops.yml 注册并启用)"
    crop-ce-none: "<color:#A9B3C3>目标 CraftEngine <color:#FFE2A9>{custom_id} <color:#A9B3C3>未被作物系统接管，无法模拟(请先在 crops.yml 的 crops.craftengine 注册并启用)"

  visual:
    only-world: "<color:#FFB4B4>该命令仅对 world 生效。"
    refresh-started: "<color:#A9B3C3>正在刷新你周围的季节视觉…"
    refresh-started-season: "<color:#A9B3C3>正在刷新季节视觉 <color:#FFE2A9>{season}"
    not-ready: "<color:#FFB4B4>视觉系统未启用或未初始化。"
    restore-hint: "<color:#A9B3C3>当前为发包视觉模式，恢复由区块重发自然完成(或重新登录)。"

