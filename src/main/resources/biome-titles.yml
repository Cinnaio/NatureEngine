biome-titles:
  enabled: true

  # 冷却（tick）。在 Biome 边界抖动时，避免反复弹出 Title
  cooldown-ticks: 600

  # 指定生效世界（为空则所有世界）
  worlds: ["world"]

  # 可选：按 group 判定边界（同组 Biome 之间移动不提示）
  # - match 支持精确 key / 通配：
  #   - minecraft:plains
  #   - terralith:*
  #   - minecraft:*_forest
  #   - *plains*
  groups:
    - id: plains
      title: "&7欢迎来到 &f平原地带"
      match: ["*plains*", "*prairie*", "*steppe*", "*meadow*", "*grassland*"]

    - id: forest
      title: "&7欢迎来到 &f森林地带"
      match: ["*forest*", "*woods*", "*grove*", "*orchard*"]

    - id: taiga
      title: "&7欢迎来到 &f针叶林地带"
      match: ["*taiga*", "*boreal*", "*conifer*", "*pine*", "*spruce*"]

    - id: jungle
      title: "&7欢迎来到 &f热带雨林"
      match: ["*jungle*", "*rainforest*", "*tropical*", "*bamboo*"]

    - id: desert
      title: "&7欢迎来到 &f荒漠地带"
      match: ["*desert*", "*dune*", "*oasis*", "*arid*"]

    - id: savanna
      title: "&7欢迎来到 &f热带草原"
      match: ["*savanna*", "*scrub*", "*dry_*", "*drylands*"]

    - id: swamp
      title: "&7欢迎来到 &f湿地沼泽"
      match: ["*swamp*", "*marsh*", "*mangrove*", "*bayou*"]

    - id: snowy
      title: "&7欢迎来到 &f雪原寒地"
      match: ["*snow*", "*ice*", "*frozen*", "*tundra*", "*glacier*"]

    - id: mountains
      title: "&7欢迎来到 &f山地高原"
      match: ["*mountain*", "*peak*", "*cliff*", "*alps*", "*highlands*", "*ridge*"]

    - id: ocean_coast
      title: "&7欢迎来到 &f海岸与海洋"
      match: ["*ocean*", "*coast*", "*beach*", "*shore*", "*reef*", "*island*"]

    - id: river_lake
      title: "&7欢迎来到 &f河流湖泊"
      match: ["*river*", "*lake*", "*delta*", "*lagoon*"]

    - id: badlands_canyon
      title: "&7欢迎来到 &f峡谷恶地"
      match: ["*badlands*", "*canyon*", "*mesa*", "*gorge*", "*ravine*"]

    - id: cave
      title: "&7欢迎来到 &f地下洞穴"
      match: ["*cave*", "*underground*", "minecraft:deep_dark", "minecraft:lush_caves", "minecraft:dripstone_caves"]

  # Biome -> Title 文本（支持 & 颜色码 / MiniMessage）
  # 当 biome 未命中任何 group 时，会回退到这里
  titles:
    minecraft:plains: "&7欢迎来到 &f平原"
    minecraft:forest: "&7欢迎来到 &f森林"
    minecraft:taiga: "&7欢迎来到 &f针叶林"
    minecraft:desert: "&7欢迎来到 &f沙漠"
    minecraft:jungle: "&7欢迎来到 &f丛林"
    minecraft:swamp: "&7欢迎来到 &f沼泽"
    minecraft:snowy_plains: "&7欢迎来到 &f雪原"
